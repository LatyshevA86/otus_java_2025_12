syntax = "proto3";

package ru.otus.protobuf;

option java_multiple_files = true;

message NumberSequenceMessage {
    int64 firstValue = 1;
    int64 lastValue = 2;
}

message NumberMessage {
    int64 newValue = 1;
}

message Empty {}

service RemoteNumberGeneratorService {
    rpc generate(NumberSequenceMessage) returns (stream NumberMessage);
}
